[dispatcher]
heartbeat_interval = 60   # seconds

# ---------------------------------------------------------------------------
# Backends — [backends.<name>.<environment>]
# A backend is started if its section exists and enabled != false.
# At least one backend must be enabled for the active environment, or
# ongwatch will log an error and exit.
# ---------------------------------------------------------------------------

[backends.twitch.production]
enabled = true

[backends.streamelements.production]
enabled = true

[backends.streamlabs.production]
enabled = true

[backends.twitch.test]
enabled = true

[backends.synthetic.test]
enabled = true

# ---------------------------------------------------------------------------
# Outputs — [outputs.<name>.<environment>]
# An output is active if its section exists and enabled != false.
# ---------------------------------------------------------------------------

[outputs.bumplog.production]
path = "/path/to/bump.log"
on_error = "queue"
queue_max_size = 100
queue_overflow = "drop_oldest"

[outputs.bumplog.test]
enabled = true
path = "-"
on_error = "queue"
queue_max_size = 100
queue_overflow = "drop_oldest"

[outputs.console.test]
enabled = true

[outputs.sqlite.production]
path = "ongwatch.db"
on_error = "queue"
queue_max_size = 0   # unbounded — don't lose records
queue_overflow = "drop_oldest"

[outputs.mqtt.production]
host            = "mqtt.example.com"
port            = 1883
channel         = "jonathanong"
topic_prefix    = ""
client_id       = ""
username        = ""
password        = ""
tls             = false
qos_events      = 1
qos_state       = 1
qos_heartbeat   = 0
on_error        = "queue"
queue_max_size  = 500
queue_overflow  = "circuit_break"
circuit_break_cooldown = 300
circuit_break_flush_queue = true
max_retries     = 5

[outputs.mqtt.test]
enabled = true
host            = "localhost"
port            = 1883
channel         = "jonathanong"
on_error        = "queue"
queue_max_size  = 500
queue_overflow  = "circuit_break"
circuit_break_cooldown = 300
