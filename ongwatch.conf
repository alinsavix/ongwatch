# configuration for ongwatch. This is a TOML file, which is irritating but
# at least relatively simple. Just follow the examples and you'll be fine.

[dispatcher]
heartbeat_interval = 60   # seconds

# ---------------------------------------------------------------------------
# Production — [production.backends.<name>] / [production.outputs.<name>]
# A backend/output is active if its section exists and enabled != false.
# At least one backend must be enabled for the active environment, or
# ongwatch will log an error and exit.
# ---------------------------------------------------------------------------

[production.backends]
twitch         = { enabled = true }
streamelements = { enabled = true }
streamlabs     = { enabled = true }

[production.outputs.bumplog]
enabled        = true
path           = "bump.log"
on_error       = "queue"
queue_max_size = 100
queue_overflow = "drop_oldest"

[production.outputs.console]
enabled = false

[production.outputs.sqlite]
enabled        = true
path           = "ongwatch_production.db"
on_error       = "queue"
queue_max_size = 0   # unbounded — don't lose records
queue_overflow = "drop_oldest"

[production.outputs.mqtt]
enabled                   = false
host                      = "localhost"
port                      = 1883
channel                   = "jonathanong"
topic_prefix              = ""
client_id                 = ""
username                  = ""
password                  = ""
tls                       = false
qos_events                = 1
qos_state                 = 1
qos_heartbeat             = 0
on_error                  = "queue"
queue_max_size            = 500
queue_overflow            = "circuit_break"
circuit_break_cooldown    = 300
circuit_break_flush_queue = true
max_retries               = 5


# ---------------------------------------------------------------------------
# Test — [test.backends.<name>] / [test.outputs.<name>]
# ---------------------------------------------------------------------------

[test.backends]
twitch         = { enabled = true }
streamelements = { enabled = true }
streamlabs     = { enabled = true }
synthetic      = { enabled = true }
test_crash     = { enabled = false }  # for testing crash handling

[test.outputs.bumplog]
enabled        = true
path           = "bump.log"
on_error       = "queue"
queue_max_size = 100
queue_overflow = "drop_oldest"

[test.outputs.console]
enabled = true

[test.outputs.sqlite]
enabled        = true
path           = "ongwatch_test.db"
on_error       = "queue"
queue_max_size = 0   # unbounded — don't lose records
queue_overflow = "drop_oldest"

[test.outputs.mqtt]
enabled                = true
host                   = "localhost"
port                   = 1883
channel                = "jonathanong"
on_error               = "queue"
queue_max_size         = 500
queue_overflow         = "circuit_break"
circuit_break_cooldown = 300

[test.outputs.test_crash]
enabled     = false
crash_after = 3   # raise on every send() after this many successes


# vim: filetype=toml
